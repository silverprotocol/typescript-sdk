name: CI

# Runs on the standalone typescript-sdk repo (this directory is the repo root
# there). Inside the private workspace/guuey supertrees this file is inert.
# Keyless: no secrets, no LLM calls — replay/census/convergence are the
# deterministic conformance gates (audit B11).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  test:
    name: typecheck + tests + conformance replay
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm spec-drift
      - run: pnpm fixture-drift
      - run: pnpm test
      - run: pnpm e2e:replay

  pack-smoke:
    name: pack → install → import smoke
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm pack:smoke
