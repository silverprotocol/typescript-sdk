# Standalone workspace root for github.com/silverprotocol/typescript-sdk (open source).
# Subtree-vendored into the PRIVATE SilverProtocol workspace at sdks/typescript.
# When vendored inside guuey, guuey's ROOT pnpm-workspace.yaml governs (it globs
# `silverprotocol/sdks/typescript/packages/*`); this file is only read when the SDK is
# built standalone.
packages:
  - "packages/*"
# pnpm 11's build-approval gate (ERR_PNPM_IGNORED_BUILDS) fails a cold
# `pnpm install` unless every dependency with a lifecycle script has an
# explicit decision recorded here. Note: pnpm 11.2.2 does NOT read a
# `pnpm.onlyBuiltDependencies` field from package.json (it warns "The
# 'pnpm' field in package.json is no longer read by pnpm") and does NOT
# honor `onlyBuiltDependencies:` in this file either — verified empirically
# via `pnpm install` on a cold clone. The key pnpm 11 actually reads (and
# auto-suggests via its own ERR_PNPM_IGNORED_BUILDS hint) is `allowBuilds`,
# a per-package boolean map; every ignored-build package must be listed
# explicitly (an empty/absent map still errors). None of these five need
# their install scripts for this SDK: their build scripts are native/CLI
# extras unused by the test suite (esbuild ships prebuilt platform
# binaries as optionalDependencies, so its own postinstall isn't needed).
# Verified: `pnpm install && pnpm typecheck && pnpm test && pnpm e2e:replay`
# all green on a fresh clone with every entry set to `false`.
allowBuilds:
  '@google/genai': false
  cpu-features: false
  esbuild: false
  protobufjs: false
  sqlite3: false
  ssh2: false
# NOTE (pnpm 11.2.2 quirk, diagnosed 2026-07-22): keep AT MOST ONE entry per
# package NAME here. The policy evaluator (createPackageVersionPolicy →
# evaluateVersionPolicy) returns on the FIRST name match, so a stale
# `pkg@old-version` entry listed above `pkg@new-version` silently makes the
# newer exclusion unreachable (ERR_PNPM_MINIMUM_RELEASE_AGE_VIOLATION on a
# lockfile that looks correctly excluded). Prune superseded entries when
# bumping; entries older than the 24h default window are dead weight anyway.
minimumReleaseAgeExclude:
  - '@ai-sdk/gateway@4.0.26'
  - '@ai-sdk/mcp@2.0.16'
  - '@ai-sdk/openai@4.0.17'
  - '@ai-sdk/provider-utils@5.0.12'
  - ai@7.0.34
  - '@anthropic-ai/claude-agent-sdk-darwin-arm64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-darwin-x64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64-musl@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-linux-arm64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-linux-x64-musl@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-linux-x64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-win32-arm64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk-win32-x64@0.3.217'
  - '@anthropic-ai/claude-agent-sdk@0.3.217'
